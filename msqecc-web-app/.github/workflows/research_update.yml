name: Auto-Update MSQECC Research Feed

on:
  schedule:
    - cron: '0 0 * * 1' # Runs every Monday at 00:00 UTC
  workflow_dispatch: # Allows manual triggering from GitHub UI

jobs:
  ingest-research:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.1x'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install arxiv pandas feedparser beautifulsoup4

      - name: Run ArXiv Ingest Script
        run: python scripts/arxiv_ingest.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "MSQECC-Research-Bot"
          git config --global user.email "bot@msqecc.org"
          git add src/data/research_stream.json
          git commit -m "chore: update empirical research stream [$(date +'%Y-%m-%d')]" || echo "No new research to commit"
          git push
